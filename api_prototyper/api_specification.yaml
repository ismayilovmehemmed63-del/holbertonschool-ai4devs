openapi: 3.0.3
info:
  title: Inventory Management API
  description: Professional API for warehouse and stock management.
  version: 1.0.0
servers:
  - url: http://localhost:8000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      required: [name, sku, price]
      properties:
        id: { type: integer }
        name: { type: string }
        sku: { type: string }
        price: { type: number }
        quantity: { type: integer }
    Error:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
paths:
  /products:
    get:
      summary: (1) List all products with pagination
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 10 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: List of products
        '401':
          description: Unauthorized
    post:
      summary: (2) Create a new product
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Created }
        '400': { description: Bad Request }
  /products/{id}:
    get:
      summary: (3) Get product by ID
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Success }
        '404': { description: Not Found }
    put:
      summary: (4) Update product
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Updated }
    delete:
      summary: (5) Delete product
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '204': { description: Deleted }
